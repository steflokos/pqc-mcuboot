# App-side Kconfig overlay for building Zephyr's own samples/hello_world
# (or any other app) so it can be signed and booted by MCUboot.
#
# Usage (from the west workspace root, alongside this mcuboot checkout):
#   west build -b arduino_uno_q zephyr/samples/hello_world -- \
#     -DEXTRA_CONF_FILE=$PWD/bootloader/mcuboot/samples/zephyr/hello-mcuboot.conf
#
# See docs/readme-zephyr.md ("Testing on real hardware (Arduino UNO Q)")
# for the full signing/flashing walkthrough.
CONFIG_BOOTLOADER_MCUBOOT=y
