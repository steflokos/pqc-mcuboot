# Kconfig overlay for building with ML-DSA-65 signatures only (no classical
# algorithm required -- PQC-only mode).
CONFIG_BOOT_SIGNATURE_TYPE_NONE=y
CONFIG_BOOT_SIGNATURE_TYPE_MLDSA_ENABLE=y
CONFIG_BOOT_SIGNATURE_TYPE_MLDSA_65=y
CONFIG_BOOT_SIGNATURE_TYPE_MLDSA_PQC_ONLY=y

# ML-DSA verification needs a large stack; the default CONFIG_MAIN_STACK_SIZE
# (10240) is not enough and causes a stack overflow during verification.
# Confirmed on real hardware (arduino_uno_q/stm32u585xx): 32768 crashes
# mid-verify (same failure mode as ML-DSA-44 at that size); 65536 works.
# See overlay-mldsa44-hybrid-ecdsa.conf's comment and
# docs/arduino-uno-q-hardware-notes.md for the full per-level comparison --
# 65536 was tested and confirmed sufficient for all three levels (44/65/87)
# with this application; it is not a per-level tuned minimum.
CONFIG_MAIN_STACK_SIZE=65536
