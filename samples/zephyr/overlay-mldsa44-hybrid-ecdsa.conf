# Kconfig overlay for building with hybrid signatures: both an ECDSA-P256
# classical signature and an ML-DSA-44 post-quantum signature must
# independently verify for boot to succeed.
CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y
CONFIG_BOOT_SIGNATURE_KEY_FILE="root-ec-p256.pem"
CONFIG_BOOT_SIGNATURE_TYPE_MLDSA_ENABLE=y
CONFIG_BOOT_SIGNATURE_TYPE_MLDSA_44=y
CONFIG_BOOT_SIGNATURE_MLDSA_KEY_FILE="root-mldsa44.pem"
